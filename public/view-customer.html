<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details - My Customers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <!-- Navigation Bar -->
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto">
            <a href="index.html" class="text-2xl font-bold">My Customers</a>
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-2xl">
        <div class="bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Customer Details</h2>
            
            <form id="customer-form" class="space-y-6">
                <!-- Photo Section -->
                <div class="flex items-center gap-6">
                    <img id="current-photo" src="https://via.placeholder.com/150" alt="Customer Photo" class="w-32 h-32 rounded-full object-cover border-4 border-gray-200">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Upload New Photo</label>
                        <input type="file" id="photo-input" accept="image/*" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        <div id="upload-progress" class="hidden w-full bg-gray-200 rounded-full h-2.5 mt-2">
                            <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Name -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                    <input type="text" id="name" name="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                </div>

                <!-- Status -->
                <div>
                    <label for="status" class="block text-sm font-medium text-gray-700">Status</label>
                    <select id="status" name="status" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                        <option value="Planning">Planning</option>
                        <option value="In-progress">In-progress</option>
                        <option value="Review">Review</option>
                        <option value="Complete">Complete</option>
                    </select>
                </div>

                <!-- Account Balance -->
                <div>
                    <label for="balance" class="block text-sm font-medium text-gray-700">Account Balance ($)</label>
                    <input type="number" id="balance" name="balance" step="0.01" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                </div>

                <!-- Invoice Placeholder -->
                <div>
                    <label class="block text-sm font-medium text-gray-700">Actions</label>
                    <button type="button" onclick="alert('Invoicing feature coming soon!')" class="mt-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded transition">
                        Generate invoice
                    </button>
                </div>

                <!-- Notes -->
                <div>
                    <label for="notes" class="block text-sm font-medium text-gray-700">Notes</label>
                    <textarea id="notes" name="notes" rows="4" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border"></textarea>
                </div>

                <!-- Buttons -->
                <div class="flex justify-between items-center pt-6 border-t">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded shadow transition">
                        Save Changes
                    </button>
                    <button type="button" id="delete-btn" class="text-red-600 hover:text-red-800 font-semibold transition">
                        Delete Customer
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Feedback Message -->
    <div id="feedback" class="fixed bottom-4 right-4 hidden bg-gray-800 text-white px-6 py-3 rounded shadow-lg transition-opacity duration-500">
    </div>

    <script type="module" src="view-customer.js"></script>
</body>
</html>
